<script>
  // Function to add message to chat area
  function addMessage(text, sender = "system") {
    const messageDiv = document.createElement('div');
    messageDiv.className = 'message';

    // Show sender info if needed
    if (sender === "user") {
      messageDiv.textContent = "You: " + text;
    } else if (sender === "other") {
      messageDiv.textContent = "Other: " + text;
    } else {
      messageDiv.textContent = text;
    }

    document.getElementById('messages').appendChild(messageDiv);
    document.querySelector('.message-area').scrollTop = document.querySelector('.message-area').scrollHeight;
  }

  // Handle keydown for '0'
  document.addEventListener('keydown', (e) => {
    if (e.key === '0') {
      const message = prompt("Enter your message:");
      if (message !== null && message.trim() !== "") {
        // Push message to Firebase
        database.ref('broadcastMessages').push({
          text: message,
          timestamp: Date.now(),
          senderId: "user" // optional, to identify sender
        });
        // Optionally, show your message immediately
        addMessage(message, "user");
      }
    }
  });

  // Listen for new messages from Firebase
  database.ref('broadcastMessages').on('child_added', (snapshot) => {
    const data = snapshot.val();
    if (data && data.text) {
      // Show every message to all clients
      // If you want to differentiate sender, check data.senderId
      addMessage(data.text, "other");
    }
  });
</script>
