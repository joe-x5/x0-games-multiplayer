<html>
  <head>
    <title>Multiplayer Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    	* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  background: linear-gradient(180deg, #64BEFF -50%, #6e96ff 69.71%, #2a65ff 150%);
  font-family: 'Source Sans Pro', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Main game container */
.game-container { 
  position: relative;
  width: 240px;
  height: 208px;
  background: url(images/map.png) no-repeat no-repeat;
  transform: scale(3);
  image-rendering: pixelated;
}

/* Player info section */
.player-info {
  position: absolute;
  top: 0;
  left: 0;
  padding: 1em;
  display: flex;
  gap: 0.5em;
  align-items: flex-end;
}

label {
  display: block;
  font-weight: bold;
}

/* Input and button styles */
input[type="text"],
button {
  font-family: inherit;
  font-weight: bold;
  font-size: 18px;
  height: 44px;
  border-radius: 4px;
  outline: 0;
}

input[type="text"] {
  outline: 0;
  padding-left: 0.5em;
  border: 3px solid #222034;
  width: 150px;
  text-transform: uppercase;
}
input[type="text"]:focus {
  border-color: #f000ff;
}

button {
  padding-left: 0.5em;
  padding-right: 0.5em;
  background: #59ff5a;
  border: 0;
  border-bottom: 2px solid #1e830b;
  cursor: pointer;
}
button:active {
  position: relative;
  top: 1px;
}

/* Character grid cells */
.grid-cell {
  position: absolute;
  width: 16px;
  height: 16px;
}

.Character {
  transition: transform 0.4s;
}

.Character.you {
  z-index: 1;
}

.Character.you .Character_you-arrow {
  display: block;
}

.Character_you-arrow {
  display: none;
  position: absolute;
  top: -18px;
  left: 5px;
  width: 7px;
  height: 5px;
  background: url(images/arrow.png) no-repeat no-repeat;
}

.Character_sprite {
  overflow: hidden;
  top: -3px;
  background: url(images/characters.png);
}

/* Character direction and color variations */
.Character[data-direction="right"] .Character_sprite {
  background-position-x: 16px;
}
.Character[data-color="red"] .Character_sprite {
  background-position-y: -16px;
}
.Character[data-color="orange"] .Character_sprite {
  background-position-y: -32px;
}
.Character[data-color="yellow"] .Character_sprite {
  background-position-y: -48px;
}
.Character[data-color="green"] .Character_sprite {
  background-position-y: -64px;
}
.Character[data-color="purple"] .Character_sprite {
  background-position-y: -80px;
}

.Character_shadow {
  background: url(images/shadow.png) no-repeat no-repeat;
}

/* Character name container */
.Character_name-container {
  position: absolute;
  top: -12px;
  left: -5px;
  font-size: 5px;
  padding: 1px 2px 1px;
  border-radius: 3px;
  background: #333;
  color: white;
  font-weight: bold;
  text-transform: uppercase;
  white-space: nowrap;
}

.Character_coins {
  margin-left: 1px;
  color: gold;
}

/* Coin styles */
.Coin_sprite {
  background: url(images/coin.png) no-repeat no-repeat;
  animation: coinFloat 0.8s linear infinite alternate-reverse;
}

@keyframes coinFloat {
  from { transform: translateY(0) }
  to { transform: translateY(5px) }
}

.Coin_shadow {
  background: url(images/coin-shadow.png) no-repeat no-repeat;
}

/* Responsive adjustments for very small screens */
@media (max-width: 400px), (max-height: 400px) {
  .game-container {
    transform: scale(1.8);
  }
}

/* Responsive adjustments for very small screens */
@media (max-width: 240px), (max-height: 240px) {
  /* Reduce padding and margins in player-info */

.Character_name-container {
font-size: 8px;
}

  /* Scale down the game container */
  .game-container {
    transform: scale(1.12);
  }

}
    </style>
  </head>
  <body>

<div style="
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
">
  

    <div class="game-container"></div>
    
    
    <div class="player-info" style="display: none;">
      <div>
        <label for="player-name">Your Name</label>
        <input id="player-name" maxlength="10" type="text" />
      </div>
      <div>
        <button id="player-color">Change Color</button>
      </div>
    </div>

</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    
    <!-- <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script> -->
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
   

    <script>
      // Your Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyC-trbNDUx0pjAM5JZQ_dsrgWIv3Zznq4k",
        authDomain: "chatbot-164b5.firebaseapp.com",
        databaseURL: "https://chatbot-164b5-default-rtdb.firebaseio.com",
        projectId: "chatbot-164b5",
        storageBucket: "chatbot-164b5.firebasestorage.app",
        messagingSenderId: "863734829369",
        appId: "1:863734829369:web:cc7e00ffd833facec3d8e8",
        measurementId: "G-KSL1VMVF58"
      };
      firebase.initializeApp(firebaseConfig);
    </script>

    <script>
      // KeyPressListener class
      class KeyPressListener {
        constructor(keyCode, callback) {
          let keySafe = true;
          this.keydownFunction = (event) => {
            if (event.code === keyCode && keySafe) {
              keySafe = false;
              callback();
            }
          };
          this.keyupFunction = (event) => {
            if (event.code === keyCode) keySafe = true;
          };
          document.addEventListener("keydown", this.keydownFunction);
          document.addEventListener("keyup", this.keyupFunction);
        }
        unbind() {
          document.removeEventListener("keydown", this.keydownFunction);
          document.removeEventListener("keyup", this.keyupFunction);
        }
      }

      // Map data and helpers
      const mapData = {
        minX: 1,
        maxX: 14,
        minY: 4,
        maxY: 12,
        blockedSpaces: {
          "7x4": true, "1x11": true, "12x10": true, "4x7": true,
          "5x7": true, "6x7": true, "8x6": true, "9x6": true,
          "10x6": true, "7x9": true, "8x9": true, "9x9": true,
        },
      };
      const playerColors = ["blue", "red", "orange", "yellow", "green", "purple"];

      function randomFromArray(array) {
        return array[Math.floor(Math.random() * array.length)];
      }
      function getKeyString(x, y) {
        return `${x}x${y}`;
      }
      function isSolid(x, y) {
        const blockedNextSpace = mapData.blockedSpaces[getKeyString(x, y)];
        return (
          blockedNextSpace ||
          x >= mapData.maxX ||
          x < mapData.minX ||
          y >= mapData.maxY ||
          y < mapData.minY
        );
      }
      function getRandomSafeSpot() {
        return randomFromArray([
          { x: 1, y: 4 }, { x: 2, y: 4 }, { x: 1, y: 5 }, { x: 2, y: 6 },
          { x: 2, y: 8 }, { x: 2, y: 9 }, { x: 4, y: 8 }, { x: 5, y: 5 },
          { x: 5, y: 8 }, { x: 5, y: 10 }, { x: 5, y: 11 }, { x: 11, y: 7 },
          { x: 12, y: 7 }, { x: 13, y: 7 }, { x: 13, y: 6 }, { x: 13, y: 8 },
          { x: 7, y: 6 }, { x: 7, y: 7 }, { x: 7, y: 8 }, { x: 8, y: 8 },
          { x: 10, y: 8 }, { x: 8, y: 8 }, { x: 11, y: 4 },
        ]);
      }

      // Main game code
      (function () {
        // Generate unique player ID
        const playerId = `player_${Date.now()}`;
        const playerRef = firebase.database().ref(`players/${playerId}`);
        let players = {};
        let playerElements = {};
        let coins = {};
        let coinElements = {};

        const gameContainer = document.querySelector(".game-container");
        const playerNameInput = document.querySelector("#player-name");
        const playerColorButton = document.querySelector("#player-color");

        // Get username from localStorage or prompt once
        let username = localStorage.getItem('username');
        if (!username) {
          username = prompt("Enter your username:");
          if (username) {
            localStorage.setItem('username', username);
          } else {
            username = "Player";
            localStorage.setItem('username', username);
          }
        }

        // Function to place coins periodically
        function placeCoin() {
          const { x, y } = getRandomSafeSpot();
          const coinRef = firebase.database().ref(`coins/${getKeyString(x, y)}`);
          coinRef.set({ x, y });
          const coinTimeouts = [2000, 3000, 4000, 5000];
          setTimeout(placeCoin, randomFromArray(coinTimeouts));
        }
        // Attempt to grab coin
        function attemptGrabCoin(x, y) {
          const key = getKeyString(x, y);
          if (coins[key]) {
            firebase.database().ref(`coins/${key}`).remove();
            if (players[playerId]) {
              players[playerId].coins += 1;
              playerRef.update({ coins: players[playerId].coins });
            }
          }
        }
        // Handle movement
        function handleArrowPress(xChange=0, yChange=0) {
          if (!players[playerId]) return;
          const newX = players[playerId].x + xChange;
          const newY = players[playerId].y + yChange;
          if (!isSolid(newX, newY)) {
            players[playerId].x = newX;
            players[playerId].y = newY;
            if (xChange === 1) players[playerId].direction = "right";
            if (xChange === -1) players[playerId].direction = "left";
            playerRef.set(players[playerId]);
            attemptGrabCoin(newX, newY);
          }
        }

        // Keyboard controls
        function handleKeyDown(e) {
          switch (e.key) {
            case "ArrowUp": case "2": handleArrowPress(0, -1); break;
            case "ArrowDown": case "8": handleArrowPress(0, 1); break;
            case "ArrowLeft": case "4": handleArrowPress(-1, 0); break;
            case "ArrowRight": case "6": handleArrowPress(1, 0); break;
          }
        }

        // initGame: initialize player and event listeners
        function initGame() {
          window.addEventListener("keydown", handleKeyDown);
          // Firebase references
          const allPlayersRef = firebase.database().ref(`players`);
          const allCoinsRef = firebase.database().ref(`coins`);

          // Create the player in Firebase
          const { x, y } = getRandomSafeSpot();
          players[playerId] = {
            id: playerId,
            name: username,
            direction: "right",
            color: randomFromArray(playerColors),
            x,
            y,
            coins: 0,
          };
          playerRef.set(players[playerId]);
          playerRef.onDisconnect().remove();

          // Listen for all players
          allPlayersRef.on("value", (snap) => {
            players = snap.val() || {};
            Object.keys(players).forEach((key) => {
              const p = players[key];
              let el = playerElements[key];
              if (el) {
                // Update existing
                el.querySelector(".Character_name").innerText = p.name;
                el.querySelector(".Character_coins").innerText = p.coins;
                el.setAttribute("data-color", p.color);
                el.setAttribute("data-direction", p.direction);
                const left = 16 * p.x + "px";
                const top = 16 * p.y - 4 + "px";
                el.style.transform = `translate3d(${left}, ${top}, 0)`;
              }
            });
          });

          // When a new player joins
          allPlayersRef.on("child_added", (snap) => {
            const addedPlayer = snap.val();
            const key = snap.key;
            const el = document.createElement("div");
            el.className = "Character grid-cell" + (key === playerId ? " you" : "");
            el.innerHTML = `
              <div class="Character_shadow grid-cell"></div>
              <div class="Character_sprite grid-cell"></div>
              <div class="Character_name-container">
                <span class="Character_name"></span>
                <span class="Character_coins">0</span>
              </div>
              <div class="Character_you-arrow"></div>
            `;
            playerElements[key] = el;
            // Fill initial state
            el.querySelector(".Character_name").innerText = addedPlayer.name;
            el.querySelector(".Character_coins").innerText = addedPlayer.coins;
            el.setAttribute("data-color", addedPlayer.color);
            el.setAttribute("data-direction", addedPlayer.direction);
            const left = 16 * addedPlayer.x + "px";
            const top = 16 * addedPlayer.y - 4 + "px";
            el.style.transform = `translate3d(${left}, ${top}, 0)`;
            gameContainer.appendChild(el);
          });

          // When a player leaves
          allPlayersRef.on("child_removed", (snap) => {
            const removedKey = snap.key;
            if (playerElements[removedKey]) {
              gameContainer.removeChild(playerElements[removedKey]);
              delete playerElements[removedKey];
            }
          });

          // Coins
          allCoinsRef.on("value", (snap) => {
            coins = snap.val() || {};
          });
          allCoinsRef.on("child_added", (snap) => {
            const c = snap.val();
            const key = getKeyString(c.x, c.y);
            coins[key] = true;
            const coinEl = document.createElement("div");
            coinEl.className = "Coin grid-cell";
            coinEl.innerHTML = `
              <div class="Coin_shadow grid-cell"></div>
              <div class="Coin_sprite grid-cell"></div>
            `;
            const left = 16 * c.x + "px";
            const top = 16 * c.y - 4 + "px";
            coinEl.style.transform = `translate3d(${left}, ${top}, 0)`;
            coinElements[key] = coinEl;
            gameContainer.appendChild(coinEl);
          });
          // Remove coins
          allCoinsRef.on("child_removed", (snap) => {
            const { x, y } = snap.val();
            const key = getKeyString(x, y);
            if (coinElements[key]) {
              gameContainer.removeChild(coinElements[key]);
              delete coinElements[key];
            }
          });

          // Player name change
          playerNameInput.value = username;
          playerNameInput.addEventListener("change", (e) => {
            const newName = e.target.value || "Player";
            if (players[playerId]) {
              players[playerId].name = newName;
              playerRef.update({ name: newName });
            }
          });
          // Color change
          playerColorButton.addEventListener("click", () => {
            if (players[playerId]) {
              const currentColor = players[playerId].color;
              const index = playerColors.indexOf(currentColor);
              const nextColor = playerColors[(index + 1) % playerColors.length];
              players[playerId].color = nextColor;
              playerRef.update({ color: nextColor });
            }
          });
          // Place initial coin
          placeCoin();
        }

        // Start game
        initGame();
      })();

    </script>
  </body>
</html>
